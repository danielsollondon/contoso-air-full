name: Promote to staging

on:
  push:
    branches:
      - development
    paths:
      - 'app/environments/development/**'

permissions:
  contents: write
  pull-requests: write

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - run: |
          # configure git client
          git config --global user.email "<email address>"
          git config --global user.name "<name>"

          # create a new branch
          git switch -c staging/${{ github.sha }}

          # promote the change
          rsync -av --delete app/environments/development/ app/environments/staging/

          # add config
          git add .

          # push the change to the new branch
          echo "push the change to the new branch"
          git commit -m "Promote development to staging"
          git push -u origin staging
          
      - run: |
          echo "gh pr create "
          gh pr create \
            -B staging \
            -H staging/${{ github.sha }} \
            --title "Promote development to staging" \
            --body "Automatically created by GitHub Actions"          
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}        
