name: Promote from Dev Branch to Staging

on:
  push:
    branches:
      - development
    paths:
      - 'app/environments/development/**'

permissions:
  contents: write
  pull-requests: write

jobs:
  promote-dev-stage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - run: |
          # configure git client
          git config --global user.email "<email address>"
          git config --global user.name "<name>"

          # create a new branch
          git switch -c staging-${{ github.sha }}

          # promote the change
          rsync -av --delete app/environments/development/ app/environments/staging/

          # add config
          git add app/environments/staging/\*

          # push the change to the new branch
          echo "push the change to the new branch"
          git commit -m "Code Promomtion"
          git push -u origin staging-${{ github.sha }}
          
      - run: |
          echo "Create PR "
          gh pr create \
            -B staging \
            -H staging-${{ github.sha }} \
            --title "Code Promotion - REVIEW" \
            --body "Automatically created by GitHub Actions"          
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}        
